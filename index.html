*{box-sizing:border-box;margin:0;padding:0}
body{background:#08090d;color:#e0e0f0;font-family:Arial,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}

.legend{display:flex;flex-wrap:wrap;gap:4px 10px;margin-bottom:6px}
.leg{display:flex;align-items:center;gap:3px;font-size:9px;color:#52547a}
.ld{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:6px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:6px 10px;border-radius:7px;font-size:11px;font-weight:700;border:1px solid #1e2035;background:#0f1018;color:#52547a;cursor:pointer;text-align:center;min-width:52px}
.tab.on{background:#ff7a2f;color:#fff;border-color:#ff7a2f}
.tab .td{font-size:12px;font-weight:900;display:block}
.tab .tp{font-size:8px;display:block;opacity:.8;margin-top:1px}
.calwrap{flex:1;display:flex;overflow:hidden;margin:0 14px 10px;border:1px solid #1e2035;border-radius:10px;background:#0f1018;position:relative}
.gutter{width:44px;flex-shrink:0;background:#0f1018;border-right:1px solid #1e2035;overflow:hidden;position:relative}
.gutinner{position:absolute;top:0;left:0;right:0}
.tick{position:absolute;right:5px;font-size:9px;color:#3a3c60;transform:translateY(-50%);white-space:nowrap;pointer-events:none}
.tick.h{color:#6062a0;font-size:10px;font-weight:700}
.scroll{flex:1;overflow-y:scroll;position:relative}
.scroll::-webkit-scrollbar{width:3px}
.scroll::-webkit-scrollbar-thumb{background:#252840;border-radius:2px}
.panel{display:none;position:relative}
.panel.on{display:block}
.gl{position:absolute;left:0;right:0;pointer-events:none}
.gl.h{border-top:1px solid #1a1c30}
.gl.hf{border-top:1px solid #1e2035}
.gl.m{border-top:1px dashed #111220}
.blk{position:absolute;left:6px;right:6px;border-radius:6px;border-left:4px solid;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:3px 7px;z-index:2}
.blk.pp{cursor:pointer}
.blk.pp:active{opacity:.8}
.bn{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.btr{display:flex;align-items:center;gap:3px;margin-top:2px}
.bt{font-size:10px;font-weight:800;padding:1px 5px;border-radius:3px;white-space:nowrap}
.barr{font-size:8px;opacity:.3;color:#fff}
.bs{font-size:9px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.55;line-height:1.2}

  {t:'sleep', d:6,sh:0, sm:0, eh:9, em:0, n:'Sleep',s:''},

  {t:'pp',    d:6,sh:13,sm:40,eh:15,em:30,n:'Paper 1',s:'9709/11 - Maths P1 - 1h 50m'},
  {t:'brk',   d:6,sh:15,sm:30,eh:16,em:15,n:'Break',s:'45m'},
  {t:'pp',    d:6,sh:16,sm:15,eh:17,em:30,n:'Paper 2',s:'9709/51 - Maths P5 - 1h 15m'},
  {t:'brk',   d:6,sh:17,sm:30,eh:18,em:5, n:'Break',s:'35m'},
  {t:'pp',    d:6,sh:18,sm:5, eh:19,em:20,n:'Paper 3',s:'9702/11 - Physics P1 - 1h 15m'},
  {t:'meal',  d:6,sh:20,sm:0, eh:20,em:45,n:'Dinner',s:'Rice day'},
  {t:'brk',   d:6,sh:20,sm:45,eh:23,em:0, n:'Evening free',s:''},
  {t:'sleep', d:6,sh:23,sm:0, eh:24,em:0, n:'Sleep',s:'wake 8:00am'}
];

// Safely get/set localStorage
function lsGet(k) { try { return localStorage.getItem(k); } catch(e) { return null; } }
function lsSet(k,v) { try { localStorage.setItem(k,v); } catch(e) {} }
function lsDel(k) { try { localStorage.removeItem(k); } catch(e) {} }

// Assign paper keys
var paperKeys = [];
var totalPapers = 0;
var i, j;
for (i = 0; i < BL.length; i++) {
  if (BL[i].t === 'pp') {
    BL[i].pkey = 'pp_d' + BL[i].d + '_' + totalPapers;
    paperKeys.push(BL[i].pkey);
    totalPapers++;
  }
}

// Build gutter
var gutinner = document.getElementById('gutinner');
gutinner.style.height = DH + 'px';
for (var gm = 0; gm <= DMINS; gm += 15) {
  var gmin = gm % 60;
  if (gmin !== 0 && gmin !== 30) continue;
  var tk = document.createElement('div');
  tk.className = 'tick' + (gmin === 0 ? ' h' : '');
  tk.style.top = (gm * PPM) + 'px';
  tk.textContent = fmt(gm);
  gutinner.appendChild(tk);
}

// Build panels and tabs
var tabsEl = document.getElementById('tabs');
var pw = document.getElementById('pw');
var panelEls = [];
var tabEls = [];
var scrollEl = document.getElementById('scroll');

for (i = 0; i < DAYS.length; i++) {
  (function(idx, day) {
    var tb = document.createElement('button');
    tb.className = 'tab';
    tb.innerHTML = '<span class="td">' + day.n + '</span><span class="tp">' + day.p + ' papers</span>';
    tb.onclick = function() { showDay(idx, -1); };
    tabsEl.appendChild(tb);
    tabEls.push(tb);

    var pn = document.createElement('div');
    pn.className = 'panel';
    pn.style.height = DH + 'px';
    pn.style.position = 'relative';

    // gridlines
    for (var lm = 0; lm <= DMINS; lm += 15) {
      var ln = lm % 60;
      if (ln !== 0 && ln !== 30) continue;
      var gl = document.createElement('div');
      gl.className = 'gl ' + (ln === 0 ? 'h' : 'm');
      gl.style.top = (lm * PPM) + 'px';
      pn.appendChild(gl);
    }

    // blocks
    for (j = 0; j < BL.length; j++) {
      var b = BL[j];
      if (b.d !== idx) continue;
      var sm2 = b.sh * 60 + b.sm;
      var em2 = b.eh * 60 + b.em;
      if (em2 > DMINS) em2 = DMINS;
      var hpx = (em2 - sm2) * PPM;
      if (hpx < 2) continue;

      var el = document.createElement('div');
      el.className = 'blk ' + b.t;
      el.style.top = (sm2 * PPM) + 'px';
      el.style.height = Math.max(hpx - 2, 4) + 'px';

      if (b.t === 'pp') {
        var isDone = lsGet(b.pkey) === '1';
        if (isDone) el.className += ' done';
        (function(el2, key) {
          el2.onclick = function() {
            var nowDone = lsGet(key) === '1';
            if (nowDone) {
              lsDel(key);
              el2.className = el2.className.replace(' done', '');
              el2.querySelector('.donebadge').textContent = '';
            } else {
              lsSet(key, '1');
              el2.className += ' done';
              el2.querySelector('.donebadge').textContent = 'DONE';
            }
            updateCounter();
          };
        })(el, b.pkey);
      }

      var html = '<span class="bn">' + b.n + '</span>';
      if (hpx >= 24) {
        html += '<div class="btr"><span class="bt">' + fmt(sm2) + '</span>'
          + '<span class="barr">&#8594;</span>'
          + '<span class="bt">' + fmt(em2) + '</span></div>';
      }
      if (hpx >= 42 && b.s) html += '<span class="bs">' + b.s + '</span>';
      if (b.t === 'pp') {
        html += '<span class="donebadge">' + (lsGet(b.pkey) === '1' ? 'DONE' : '') + '</span>';
      }
      el.innerHTML = html;
      pn.appendChild(el);
    }

    pw.appendChild(pn);
    panelEls.push(pn);
  })(i, DAYS[i]);
}

// Sync gutter with scroll
scrollEl.addEventListener('scroll', function() {
  gutinner.style.top = '-' + scrollEl.scrollTop + 'px';
  checkMidnight();
});

var curDay = 0;
var blockSwitch = false;

function showDay(idx, scrollMin) {
  curDay = idx;
  var k;
  for (k = 0; k < tabEls.length; k++) tabEls[k].className = k === idx ? 'tab on' : 'tab';
  for (k = 0; k < panelEls.length; k++) panelEls[k].className = k === idx ? 'panel on' : 'panel';
  blockSwitch = true;
  if (scrollMin >= 0) {
    scrollEl.scrollTop = scrollMin * PPM;
  } else {
    scrollEl.scrollTop = 0;
  }
  gutinner.style.top = '-' + scrollEl.scrollTop + 'px';
  updateRedLine();
  setTimeout(function() { blockSwitch = false; }, 200);
}

// Midnight cross detection
var lastST = 0;
function checkMidnight() {
  if (blockSwitch) return;
  var st = scrollEl.scrollTop;
  var vh = scrollEl.clientHeight;
  var maxST = DH - vh;
  if (st >= maxST - 5 && lastST < maxST - 5 && curDay < 6) {
    showDay(curDay + 1, 0);
  }
  lastST = st;
}

// Touch: scroll past top -> prev day
var touchStartY = 0;
var touchStartST = 0;
scrollEl.addEventListener('touchstart', function(e) {
  touchStartY = e.touches[0].clientY;
  touchStartST = scrollEl.scrollTop;
}, {passive:true});
scrollEl.addEventListener('touchend', function(e) {
  var dy = e.changedTouches[0].clientY - touchStartY;
  if (dy > 40 && touchStartST < 5 && curDay > 0) {
    showDay(curDay - 1, DMINS - scrollEl.clientHeight / PPM);
  }
}, {passive:true});

// Red line
var redLine = document.getElementById('redline');
var redLabel = document.getElementById('redlabel');
function updateRedLine() {
  var now = new Date();
  var jsd = now.getDay();
  var ourd = jsd === 0 ? 6 : jsd - 1;
  if (curDay === ourd) {
    var mins = now.getHours() * 60 + now.getMinutes();
    var topPx = mins * PPM;
    redLine.style.top = topPx + 'px';
    redLine.style.display = 'block';
    redLabel.style.top = (topPx - 10) + 'px';
    redLabel.textContent = fmt(mins);
    redLabel.style.display = 'block';
  } else {
    redLine.style.display = 'none';
    redLabel.style.display = 'none';
  }
}
setInterval(updateRedLine, 30000);

// Grey hover line
var greyLine = document.getElementById('greyline');
var greyLabel = document.getElementById('greylabel');
scrollEl.addEventListener('mousemove', function(e) {
  var rect = scrollEl.getBoundingClientRect();
  var relY = e.clientY - rect.top + scrollEl.scrollTop;
  var mins = Math.round(relY / PPM);
  if (mins >= 0 && mins <= DMINS) {
    greyLine.style.top = (mins * PPM) + 'px';
    greyLine.style.display = 'block';
    greyLabel.style.top = (mins * PPM - 10) + 'px';
    greyLabel.textContent = fmt(mins);
    greyLabel.style.display = 'block';
  }
});
scrollEl.addEventListener('mouseleave', function() {
  greyLine.style.display = 'none';
  greyLabel.style.display = 'none';
});

// Counter
function updateCounter() {
  var done = 0, k;
  for (k = 0; k < paperKeys.length; k++) {
    if (lsGet(paperKeys[k]) === '1') done++;
  }
  document.getElementById('pcounter').textContent = done + ' / ' + totalPapers + ' done';
}
updateCounter();

// Init on load
window.onload = function() {
  var now = new Date();
  var jsd = now.getDay();
  var ourd = jsd === 0 ? 6 : jsd - 1;
  var mins = now.getHours() * 60 + now.getMinutes();
  var vh = scrollEl.clientHeight;
  var targetScroll = Math.max(0, mins * PPM - vh / 3);
  showDay(ourd, targetScroll / PPM);
};
</script>
</body>
