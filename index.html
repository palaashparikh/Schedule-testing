<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Palaash Weekly Schedule</title>
<style>
/* --- ORIGINAL STYLING RESTORED --- */
body{margin:0;padding:16px 14px 60px;background:#08090d;color:#e0e0f0;font-family:Arial,sans-serif;overflow-x:hidden}
h1{font-size:32px;font-weight:900;letter-spacing:3px;color:#ff7a2f;margin:0 0 4px}
.sub{font-size:10px;color:#52547a;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.stats{display:flex;gap:8px;margin-bottom:14px}
.stat{background:#0f1018;border:1px solid #1e2035;border-radius:8px;padding:8px 12px;flex:1}
.sv{font-size:24px;font-weight:900;color:#ff7a2f;line-height:1}
.sl{font-size:9px;color:#52547a;text-transform:uppercase;margin-top:2px}

.legend{display:flex;flex-wrap:wrap;gap:6px 12px;margin-bottom:14px}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:#52547a}
.ld{width:8px;height:8px;border-radius:2px}

/* --- NEW SEAMLESS SCROLLING ENGINE --- */
.tabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;position:sticky;top:0;z-index:100;background:#08090d;padding:4px 0}
.tab{flex-shrink:0;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;border:1px solid #1e2035;background:#0f1018;color:#52547a;min-width:62px}
.tab.on{background:#ff7a2f;color:#fff;border-color:#ff7a2f}

.view-viewport{background:#0f1018;border:1px solid #1e2035;border-radius:10px;overflow:hidden;height:70vh;position:relative}
.view-canvas{display:flex;height:100%;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth}
.view-canvas::-webkit-scrollbar{display:none}

.day-col{flex:0 0 100%;scroll-snap-align:start;height:100%;overflow-y:auto;position:relative;display:flex}
.gutter{width:46px;flex-shrink:0;position:sticky;left:0;background:#0f1018;border-right:1px solid #1e2035;z-index:5}
.tick{position:absolute;right:6px;font-size:9px;color:#3a3c60;font-weight:700;transform:translateY(-50%)}
.tick.h{color:#6062a0;font-size:10px}

.body-content{flex:1;position:relative;background-image:linear-gradient(#1a1c30 1px, transparent 1px);background-size:100% 75px}

/* --- BLOCKS & TRACKER --- */
.blk{position:absolute;left:8px;right:8px;border-radius:6px;border-left:4px solid;padding:3px 8px;display:flex;flex-direction:column;justify-content:center;z-index:2;text-decoration:none}
.bn{font-size:13px;font-weight:700;line-height:1.2}
.bs{font-size:10px;opacity:.6;margin-top:2px}
.done{background:rgba(34,201,122,0.2)!important;border-color:#22c97a!important;color:#8aefca!important}
.done::after{content:"✓";position:absolute;right:8px;font-weight:900;color:#22c97a}

/* --- COLORS --- */
.pp{background:rgba(255,122,47,.16);color:#ffc090;border-color:#ff7a2f}
.ph{background:rgba(61,158,255,.13);color:#7dc4ff;border-color:#3d9eff}
.ma{background:rgba(34,201,122,.13);color:#5edfaa;border-color:#22c97a}
.ip{background:rgba(245,158,11,.13);color:#ffc84a;border-color:#f59e0b}
.gym{background:rgba(255,85,85,.13);color:#ff8888;border-color:#ff5555}
.travel{background:rgba(82,84,122,.1);color:#a0a2c0;border-color:#52547a}
.meal{background:rgba(210,160,80,.1);color:#d0a050;border-color:#705020}

#now-line{position:absolute;left:0;right:0;border-top:2px solid #ff4444;z-index:10;pointer-events:none}
</style>
</head>
<body>

<h1>PALAASH</h1>
<p class="sub">AS LEVEL • MAY/JUNE 2026</p>

<div class="stats">
  <div class="stat"><div class="sv" id="p-count">0</div><div class="sl">Done</div></div>
  <div class="stat"><div class="sv">20</div><div class="sl">Papers</div></div>
</div>

<div class="legend">
  <div class="leg"><div class="ld pp" style="background:#ff7a2f"></div>Papers</div>
  <div class="leg"><div class="ld ph" style="background:#3d9eff"></div>Physics</div>
  <div class="leg"><div class="ld ma" style="background:#22c97a"></div>Maths</div>
  <div class="leg"><div class="ld travel" style="background:#52547a"></div>Travel</div>
</div>

<div class="tabs" id="tab-bar"></div>

<div class="view-viewport">
  <div class="view-canvas" id="canvas"></div>
</div>

<script>
const PPM = 2.5; 
const DAYS = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
const DATA = [
    {d:0, t:'pp', n:'Paper 1', s:'9702/11 Physics', sh:9, sm:15, eh:10, em:30},
    {d:0, t:'pp', n:'Paper 2', s:'9709/51 Maths', sh:11, sm:30, eh:12, em:45},
    {d:0, t:'meal', n:'Lunch', s:'Fixed', sh:13, sm:0, eh:13, em:40},
    {d:0, t:'pp', n:'Paper 3', s:'9702/21 Physics', sh:13, sm:40, eh:14, em:55},
    {d:0, t:'gym', n:'Gym', s:'Chest/Shoulders', sh:16, sm:30, eh:18, em:0},
    {d:1, t:'pp', n:'Paper 1', s:'9709/11 Maths', sh:8, sm:45, eh:10, em:35},
    {d:1, t:'travel', n:'Travel', s:'To Andheri Stn', sh:15, sm:30, eh:16, em:30},
    {d:1, t:'ma', n:'Maths Class', s:'Andheri', sh:16, sm:30, eh:18, em:0, url:'https://maps.app.goo.gl/Rk54YKa3mMFQ9U2k7?g_st=ic'},
    {d:1, t:'travel', n:'Travel', s:'To Vileparle Stn', sh:18, sm:0, eh:18, em:30},
    {d:1, t:'ip', n:'IPMAT Class', s:'Vileparle', sh:18, sm:30, eh:20, em:30, url:'https://maps.app.goo.gl/R1gaydWKPJfD8rRi7?g_st=ic'},
    {d:3, t:'travel', n:'Travel', s:'To Bandra', sh:12, sm:30, eh:13, em:30},
    {d:3, t:'ph', n:'Physics Class', s:'Bandra', sh:13, sm:30, eh:15, em:30, url:'https://maps.app.goo.gl/utZJ6Gy1xQahx1gL8?g_st=ic'}
];

const canvas = document.getElementById('canvas');
const tabBar = document.getElementById('tab-bar');

DAYS.forEach((name, i) => {
    // Tabs
    let btn = document.createElement('div');
    btn.className = 'tab'; btn.innerText = name;
    btn.onclick = () => canvas.scrollTo({left: canvas.offsetWidth * i});
    tabBar.appendChild(btn);

    // Columns
    let col = document.createElement('div'); col.className = 'day-col';
    let gut = document.createElement('div'); gut.className = 'gutter';
    for(let h=0; h<=24; h++) {
        let t = document.createElement('div'); t.className = 'tick h';
        t.style.top = (h*60*PPM) + 'px';
        t.innerText = h===0?'12am':(h>12?h-12+'pm':h+'am');
        gut.appendChild(t);
    }
    let body = document.createElement('div'); body.className = 'body-content';
    body.style.height = (24*60*PPM) + 'px';

    DATA.filter(b => b.d === i).forEach(b => {
        let block = document.createElement(b.url ? 'a' : 'div');
        if(b.url) block.href = b.url;
        block.className = `blk ${b.t}`;
        block.style.top = (b.sh*60+b.sm)*PPM + 'px';
        block.style.height = ((b.eh*60+b.em)-(b.sh*60+b.sm))*PPM + 'px';
        
        let id = `p-${i}-${b.sh}-${b.sm}`;
        if(localStorage.getItem(id)) block.classList.add('done');
        
        block.onclick = (e) => {
            if(b.t==='pp') {
                e.preventDefault();
                block.classList.toggle('done');
                localStorage.getItem(id) ? localStorage.removeItem(id) : localStorage.setItem(id, '1');
                updatePapers();
            }
        };
        block.innerHTML = `<span class="bn">${b.n}</span><span class="bs">${b.s}</span>`;
        body.appendChild(block);
    });

    if(i === [6,0,1,2,3,4,5][new Date().getDay()]) {
        let nl = document.createElement('div'); nl.id = 'now-line';
        body.appendChild(nl);
        setInterval(() => {
            let n = new Date();
            nl.style.top = (n.getHours()*60 + n.getMinutes()) * PPM + 'px';
        }, 10000);
    }

    col.appendChild(gut); col.appendChild(body);
    canvas.appendChild(col);
});

function updatePapers() {
    let count = 0;
    for(let i=0; i<localStorage.length; i++) if(localStorage.key(i).startsWith('p-')) count++;
    document.getElementById('p-count').innerText = count;
}

canvas.onscroll = () => {
    let idx = Math.round(canvas.scrollLeft / canvas.offsetWidth);
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('on', i === idx));
};

// Initial state
const todayIdx = [6,0,1,2,3,4,5][new Date().getDay()];
setTimeout(() => {
    canvas.scrollTo({left: canvas.offsetWidth * todayIdx, behavior: 'instant'});
    let now = new Date();
    document.querySelectorAll('.day-col')[todayIdx].scrollTop = (now.getHours()*60+now.getMinutes())*PPM - 150;
}, 100);
updatePapers();
</script>
</body>
</html>
