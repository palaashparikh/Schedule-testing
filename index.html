<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palaash Weekly Schedule</title>
<style>
body{margin:0;padding:16px 14px 60px;background:#08090d;color:#e0e0f0;font-family:Arial,sans-serif;scroll-behavior:smooth}
h1{font-size:32px;font-weight:900;letter-spacing:3px;color:#ff7a2f;margin:0 0 4px}
.sub{font-size:10px;color:#52547a;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.stat{background:#0f1018;border:1px solid #1e2035;border-radius:8px;padding:8px 12px;flex:1;min-width:70px}
.sv{font-size:24px;font-weight:900;color:#ff7a2f;line-height:1}
.sl{font-size:9px;color:#52547a;text-transform:uppercase;margin-top:2px}
.legend{display:flex;flex-wrap:wrap;gap:6px 12px;margin-bottom:14px}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:#52547a}
.ld{width:8px;height:8px;border-radius:2px}
.tabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;
  border:1px solid #1e2035;background:#0f1018;color:#52547a;cursor:pointer;min-width:62px;text-align:center;transition:0.2s}
.tab.on{background:#ff7a2f;color:#fff;border-color:#ff7a2f}
.wrap{background:#0f1018;border:1px solid #1e2035;border-radius:10px;overflow:hidden;
  max-height:70vh;overflow-y:scroll;position:relative}
.inner{display:flex}
.gutter{width:46px;flex-shrink:0;position:relative;background:#0f1018;border-right:1px solid #1e2035}
.tick{position:absolute;right:6px;font-size:9px;color:#3a3c60;font-weight:700;
  transform:translateY(-50%);white-space:nowrap}
.tick.h{color:#6062a0;font-size:10px}
.panel{display:none;flex:1;flex-direction:column;min-width:0}
.panel.on{display:flex}
.dhdr{position:sticky;top:0;z-index:10;background:rgba(19,20,30,0.9);backdrop-filter:blur(8px);
  border-bottom:1px solid #252840;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;height:56px}
.dn{font-size:22px;font-weight:900;letter-spacing:2px;color:#e0e0f0}
.ds{font-size:10px;color:#52547a;margin-top:2px}
.badge{font-size:10px;font-weight:700;padding:4px 12px;border-radius:16px;background:rgba(255,122,47,.15);color:#ff7a2f;border:1px solid rgba(255,122,47,.3)}
.body{position:relative}
.gl{position:absolute;left:0;right:0}
.gl.h{border-top:1px solid #1a1c30}
.gl.m{border-top:1px dashed #121420}
.blk{position:absolute;left:8px;right:8px;border-radius:6px;border-left:4px solid;
  overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:3px 8px;z-index:2;text-decoration:none}
.bn{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.bt{font-size:11px;font-weight:800;padding:1px 6px;border-radius:3px;background:rgba(255,255,255,0.1)}
.bs{font-size:10px;margin-top:2px;opacity:0.7}

/* Specific Block Colors */
.pp{background:rgba(255,122,47,.16);color:#ffc090;border-color:#ff7a2f}
.ph{background:rgba(61,158,255,.13);color:#7dc4ff;border-color:#3d9eff;cursor:pointer}
.ma{background:rgba(34,201,122,.13);color:#5edfaa;border-color:#22c97a;cursor:pointer}
.ip{background:rgba(245,158,11,.13);color:#ffc84a;border-color:#f59e0b;cursor:pointer}
.ch{background:rgba(168,85,247,.13);color:#c890ff;border-color:#a855f7}
.gym{background:rgba(255,85,85,.13);color:#ff8888;border-color:#ff5555}
.hw{background:rgba(244,114,182,.13);color:#f9a8d4;border-color:#f472b6}
.wake{background:#141828;color:#9090d0;border-color:#3040a0}
.meal{background:#1c1408;color:#d0a050;border-color:#705020}
.brk{background:#0c180c;color:#60a060;border-color:#1e4020}
.travel{background:#0c1620;color:#6090b8;border-color:#1e4060}

/* Now Indicator */
.now-indicator {
  position: absolute; left: 0; right: 0; border-top: 2px solid #ff4444; z-index: 100; pointer-events: none;
}
.now-indicator::before {
  content: "NOW"; position: absolute; right: 4px; top: -14px; background: #ff4444; color: white;
  font-size: 8px; padding: 1px 4px; border-radius: 4px; font-weight: bold;
}
</style>
</head>
<body>

<h1>WEEKLY SCHEDULE</h1>
<p id="current-date" style="color:#52547a; font-size:12px; font-weight: bold; margin-bottom: 10px;"></p>

<div class="stats">
  <div class="stat"><div class="sv">20</div><div class="sl">Papers/wk</div></div>
  <div class="stat"><div class="sv">4</div><div class="sl">Gym days</div></div>
  <div class="stat"><div class="sv">Maps</div><div class="sl">Tuition Nav</div></div>
</div>

<div class="tabs" id="tabs"></div>
<div class="wrap"><div class="inner">
  <div class="gutter" id="gutter"></div>
  <div id="pw" style="flex:1;min-width:0;display:flex">
    <div id="now-line" class="now-indicator"></div>
  </div>
</div></div>

<script>
var SM=7*60, EM=22*60+30, PPM=2.2, HH=56;
var TH=(EM-SM)*PPM;

// Tuition Links
var LOCS = {
  'ph': 'https://maps.app.goo.gl/utZJ6Gy1xQahx1gL8?g_st=ic',
  'ma': 'https://maps.app.goo.gl/Rk54YKa3mMFQ9U2k7?g_st=ic',
  'ip': 'https://maps.app.goo.gl/R1gaydWKPJfD8rRi7?g_st=ic'
};

function ft(h,m){
  var x=h>12?h-12:(h===0?12:h);
  var a=h>=12?'pm':'am';
  var s=m===0?'':(':'+(m<10?'0'+m:''+m));
  return x+s+a;
}

var DAYS=[
  {id:0,name:'Mon',full:'Monday',sub:'4 papers - Gym - Chest',p:4},
  {id:1,name:'Tue',full:'Tuesday',sub:'3 Maths papers - Classes',p:3},
  {id:2,name:'Wed',full:'Wednesday',sub:'3 papers - Gym - Legs',p:3},
  {id:3,name:'Thu',full:'Thursday',sub:'IPMAT HW - 1 paper - Classes',p:1},
  {id:4,name:'Fri',full:'Friday',sub:'3 papers - Physics - Abs',p:3},
  {id:5,name:'Sat',full:'Saturday',sub:'3 papers - Chem - Back',p:3},
  {id:6,name:'Sun',full:'Sunday',sub:'3 papers - Physics at home',p:3}
];

// Blocks Array (Simplified example showing new clickable structure)
var BL=[
  // Monday
  {t:'wake', d:0,sh:8,sm:0, eh:8,em:45,n:'Wake up'},
  {t:'meal', d:0,sh:8,sm:45,eh:9,em:10,n:'Breakfast',s:'3 eggs'},
  {t:'pp',   d:0,sh:9,sm:15,eh:10,em:30,n:'Paper 1',s:'9702/11'},
  {t:'pp',   d:0,sh:11,sm:30,eh:12,em:45,n:'Paper 2',s:'9709/51'},
  {t:'meal', d:0,sh:13,sm:0, eh:13,em:40,n:'Lunch'},
  {t:'pp',   d:0,sh:13,sm:40,eh:14,em:55,n:'Paper 3',s:'9702/21'},
  {t:'gym',  d:0,sh:16,sm:30,eh:18,em:0,n:'Gym',s:'Chest'},
  {t:'pp',   d:0,sh:18,sm:35,eh:19,em:50,n:'Paper 4',s:'9709/52'},
  
  // Tuesday (Classes)
  {t:'pp',   d:1,sh:8,sm:45,eh:10,em:35,n:'Paper 1',s:'9709/11'},
  {t:'ma',   d:1,sh:16,sm:30,eh:18,em:0,n:'Maths Class',s:'Tap for Maps'},
  {t:'ip',   d:1,sh:18,sm:30,eh:20,em:30,n:'IPMAT Class',s:'Tap for Maps'},
  
  // Wednesday
  {t:'pp',   d:2,sh:9,sm:15,eh:10,em:30,n:'Paper 1',s:'9702/12'},
  {t:'pp',   d:2,sh:11,sm:10,eh:12,em:25,n:'Paper 2',s:'9702/22'},
  {t:'pp',   d:2,sh:13,sm:40,eh:14,em:55,n:'Paper 3',s:'9709/52'},
  {t:'gym',  d:2,sh:16,sm:30,eh:18,em:0,n:'Gym',s:'Legs'},
  {t:'ch',   d:2,sh:18,sm:30,eh:20,em:0,n:'Chemistry',s:'Home'},

  // Thursday (Heavy)
  {t:'hw',   d:3,sh:9,sm:15,eh:10,em:15,n:'IPMAT HW'},
  {t:'ph',   d:3,sh:13,sm:30,eh:15,em:30,n:'Physics Class',s:'Tap for Maps'},
  {t:'ma',   d:3,sh:16,sm:30,eh:18,em:0,n:'Maths Class',s:'Tap for Maps'},
  {t:'ip',   d:3,sh:18,sm:30,eh:20,em:30,n:'IPMAT Class',s:'Tap for Maps'},

  // Friday
  {t:'ph',   d:4,sh:13,sm:30,eh:15,em:30,n:'Physics Class',s:'Tap for Maps'},
  {t:'gym',  d:4,sh:17,sm:0, eh:18,em:30,n:'Gym',s:'Abs'},

  // Saturday
  {t:'ch',   d:5,sh:11,sm:0, eh:12,em:30,n:'Chemistry',s:'Home'},
  {t:'gym',  d:5,sh:17,sm:0, eh:18,em:30,n:'Gym',s:'Back'},
  
  // Sunday
  {t:'ph',   d:6,sh:11,sm:0, eh:12,em:30,n:'Physics',s:'Home'}
];

// Setup Gutter/Time ticks
var gut=document.getElementById('gutter');
gut.style.height=(TH+HH)+'px';
for(var m=SM;m<=EM;m+=30){
  var tk=document.createElement('div');
  tk.className='tick'+(m%60===0?' h':'');
  tk.style.top=((m-SM)*PPM+HH)+'px';
  var h=Math.floor(m/60);
  tk.textContent=ft(h,m%60);
  gut.appendChild(tk);
}

var tabs=[], panels=[];
DAYS.forEach((day,idx)=>{
  var tb=document.createElement('button');
  tb.className='tab'; tb.innerHTML='<b>'+day.name+'</b>';
  tb.onclick=()=>show(idx);
  document.getElementById('tabs').appendChild(tb);
  tabs.push(tb);

  var pn=document.createElement('div'); pn.className='panel';
  pn.innerHTML='<div class="dhdr"><div class="dn">'+day.full+'</div><span class="badge">'+day.p+' Papers</span></div><div class="body" style="height:'+TH+'px"></div>';
  document.getElementById('pw').appendChild(pn);
  panels.push(pn);

  BL.filter(b=>b.d===idx).forEach(b=>{
    var el = document.createElement(LOCS[b.t] ? 'a' : 'div');
    if(LOCS[b.t]) { el.href = LOCS[b.t]; el.target = "_blank"; }
    el.className='blk '+b.t;
    el.style.top=((b.sh*60+b.sm)-SM)*PPM+'px';
    el.style.height=(((b.eh*60+b.em)-(b.sh*60+b.sm))*PPM-2)+'px';
    el.innerHTML='<span class="bn">'+b.n+'</span><span class="bs">'+(b.s||'')+'</span>';
    pn.querySelector('.body').appendChild(el);
  });
});

function show(idx){
  tabs.forEach((t,i)=>t.className=i===idx?'tab on':'tab');
  panels.forEach((p,i)=>p.className=i===idx?'panel on':'panel');
}

// Update "NOW" line
function updateNow(){
  var now = new Date();
  var mins = now.getHours()*60 + now.getMinutes();
  var line = document.getElementById('now-line');
  if(mins >= SM && mins <= EM){
    line.style.display = 'block';
    line.style.top = (mins-SM)*PPM + 'px';
  } else { line.style.display = 'none'; }
}

// Set Date and Auto-Tab
var today = new Date();
document.getElementById('current-date').innerText = today.toDateString().toUpperCase();
var jsDay = today.getDay(); // Sun=0, Mon=1...
var dayMap = [6,0,1,2,3,4,5]; // Map to your array index
show(dayMap[jsDay]);
setInterval(updateNow, 60000); updateNow();

</script>
</body>
</html>
