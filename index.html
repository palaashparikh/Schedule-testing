<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palaash Weekly Schedule</title>
<style>
/* --- YOUR ORIGINAL CSS: UNTOUCHED --- */
body{margin:0;padding:16px 14px 60px;background:#08090d;color:#e0e0f0;font-family:Arial,sans-serif}
h1{font-size:32px;font-weight:900;letter-spacing:3px;color:#ff7a2f;margin:0 0 4px}
.sub{font-size:10px;color:#52547a;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.stat{background:#0f1018;border:1px solid #1e2035;border-radius:8px;padding:8px 12px;flex:1;min-width:70px}
.sv{font-size:24px;font-weight:900;color:#ff7a2f;line-height:1}
.sl{font-size:9px;color:#52547a;text-transform:uppercase;margin-top:2px}
.legend{display:flex;flex-wrap:wrap;gap:6px 12px;margin-bottom:14px}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:#52547a}
.ld{width:8px;height:8px;border-radius:2px}
.tabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;
  border:1px solid #1e2035;background:#0f1018;color:#52547a;cursor:pointer;min-width:62px;text-align:center}
.tab.on{background:#ff7a2f;color:#fff;border-color:#ff7a2f}
.wrap{background:#0f1018;border:1px solid #1e2035;border-radius:10px;overflow:hidden;
  max-height:70vh;overflow-y:scroll;position:relative}
.inner{display:flex}
.gutter{width:46px;flex-shrink:0;position:relative;background:#0f1018;border-right:1px solid #1e2035}
.tick{position:absolute;right:6px;font-size:9px;color:#3a3c60;font-weight:700;
  transform:translateY(-50%);white-space:nowrap}
.tick.h{color:#6062a0;font-size:10px}
.panel{display:none;flex:1;flex-direction:column;min-width:0}
.panel.on{display:flex}
.dhdr{position:sticky;top:0;z-index:10;background:#13141e;border-bottom:1px solid #252840;
  padding:10px 14px;display:flex;align-items:center;justify-content:space-between;height:56px}
.dn{font-size:22px;font-weight:900;letter-spacing:2px;color:#e0e0f0}
.ds{font-size:10px;color:#52547a;margin-top:2px}
.dhdr.heavy .dn{color:#f59e0b}
.badge{font-size:10px;font-weight:700;padding:4px 12px;border-radius:16px;
  background:rgba(255,122,47,.15);color:#ff7a2f;border:1px solid rgba(255,122,47,.3)}
.body{position:relative}
.gl{position:absolute;left:0;right:0}
.gl.h{border-top:1px solid #1a1c30}
.gl.m{border-top:1px dashed #121420}
.blk{position:absolute;left:8px;right:8px;border-radius:6px;border-left:4px solid;
  overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:3px 8px;z-index:2}
.bn{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.btr{display:flex;align-items:center;gap:3px;margin-top:2px}
.bt{font-size:11px;font-weight:800;padding:1px 6px;border-radius:3px;white-space:nowrap}
.barr{font-size:9px;color:#ffffff;opacity:.3}
.bs{font-size:10px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.6;line-height:1.2}

/* --- COLORS --- */
.blk.pp{background:rgba(255,122,47,.16);color:#ffc090;border-color:#ff7a2f}
.blk.ph{background:rgba(61,158,255,.13);color:#7dc4ff;border-color:#3d9eff}
.blk.ch{background:rgba(168,85,247,.13);color:#c890ff;border-color:#a855f7}
.blk.ma{background:rgba(34,201,122,.13);color:#5edfaa;border-color:#22c97a}
.blk.ip{background:rgba(245,158,11,.13);color:#ffc84a;border-color:#f59e0b}
.blk.gym{background:rgba(255,85,85,.13);color:#ff8888;border-color:#ff5555}
.blk.wake{background:#141828;color:#9090d0;border-color:#3040a0}
.blk.meal{background:#1c1408;color:#d0a050;border-color:#705020}
.blk.travel{background:#0c1620;color:#6090b8;border-color:#1e4060}

/* --- LOGIC STYLES --- */
.blk.done { background: rgba(34,201,122,0.3) !important; border-color: #22c97a !important; color: #8aefca !important; }
.blk.done .bn::after { content: " ✓"; color: #22c97a; font-weight: 800; }
#now-line { position: absolute; left: 0; right: 0; border-top: 2px solid #ff4444; z-index: 100; pointer-events: none; }
#now-line::after { content: "NOW"; position: absolute; right: 4px; top: -14px; background: #ff4444; color: white; font-size: 8px; padding: 1px 4px; border-radius: 4px; }
</style>
</head>
<body>

<h1>WEEKLY SCHEDULE</h1>
<p class="sub">Physics 9702 &middot; Maths 9709 &middot; 20 Papers &middot; 4 Gym Sessions</p>

<div class="stats">
  <div class="stat"><div class="sv" id="papers-count">0</div><div class="sl">Papers Done</div></div>
  <div class="stat"><div class="sv">20</div><div class="sl">Papers/wk</div></div>
  <div class="stat"><div class="sv">4</div><div class="sl">Gym days</div></div>
</div>

<div class="legend">
  <div class="leg"><div class="ld" style="background:#ffd4b0"></div>Paper</div>
  <div class="leg"><div class="ld" style="background:#a8d8ff"></div>Physics</div>
  <div class="leg"><div class="ld" style="background:#8aefca"></div>Maths</div>
  <div class="leg"><div class="ld" style="background:#ffaaaa"></div>Gym</div>
  <div class="leg"><div class="ld" style="background:#80b0d8"></div>Travel</div>
</div>

<div class="tabs" id="tabs"></div>
<div class="wrap" id="scroller"><div class="inner">
  <div class="gutter" id="gutter"></div>
  <div id="pw" style="flex:1;min-width:0;display:flex;position:relative"></div>
</div></div>

<script>
// Logic parameters
var SM=0, EM=1440, PPM=2.2, HH=56;
var TH=(EM-SM)*PPM;

function tp(h,m){return((h*60+m)-SM)*PPM;}
function hp(sh,sm,eh,em){return((eh*60+em)-(sh*60+sm))*PPM;}
function ft(h,m){
  var x=h>12?h-12:(h===0?12:h);
  var a=h>=12?'pm':'am';
  var s=m===0?'':(':'+(m<10?'0'+m:''+m));
  return x+s+a;
}

// YOUR ORIGINAL DATA
var DAYS=[
  {id:0,name:'Mon',full:'Monday',sub:'4 papers - Gym - Chest',p:4},
  {id:1,name:'Tue',full:'Tuesday',sub:'3 Maths papers - Classes',p:3},
  {id:2,name:'Wed',full:'Wednesday',sub:'3 papers - Gym - Legs',p:3},
  {id:3,name:'Thu',full:'Thursday',sub:'IPMAT HW - 1 paper - Classes',p:1,hv:1},
  {id:4,name:'Fri',full:'Friday',sub:'3 papers - Physics - Abs',p:3},
  {id:5,name:'Sat',full:'Saturday',sub:'3 papers - Chem - Back',p:3},
  {id:6,name:'Sun',full:'Sunday',sub:'3 papers - Physics at home',p:3}
];

var BL=[
  {t:'wake', d:0,sh:8,sm:0, eh:8,em:45,n:'Wake up + morning routine',s:'45m'},
  {t:'pp',   d:0,sh:9,sm:15,eh:10,em:30,n:'Paper 1',s:'9702/11 Physics'},
  {t:'pp',   d:0,sh:11,sm:30,eh:12,em:45,n:'Paper 2',s:'9709/51 Maths'},
  {t:'meal', d:0,sh:13,sm:0, eh:13,em:40,n:'Lunch',s:'Fixed'},
  {t:'pp',   d:0,sh:13,sm:40,eh:14,em:55,n:'Paper 3',s:'9702/21 Physics'},
  {t:'gym',  d:0,sh:16,sm:30,eh:18,em:0,n:'Gym',s:'Chest - Shoulders'},
  {t:'pp',   d:0,sh:18,sm:35,eh:19,em:50,n:'Paper 4',s:'9709/52 Maths'},
  {t:'pp',   d:1,sh:8,sm:45,eh:10,em:35,n:'Paper 1',s:'9709/11 Maths'},
  {t:'ma',   d:1,sh:16,sm:30,eh:18,em:0,n:'Maths Class',s:'Andheri Stn'},
  {t:'ip',   d:1,sh:18,sm:30,eh:20,em:30,n:'IPMAT Class',s:'Vileparle Stn'}
];

// 24H Gutter setup
var gut=document.getElementById('gutter');
gut.style.height=(TH+HH)+'px';
for(var gm=0; gm<=1440; gm+=30){
    var gh=Math.floor(gm/60), gn=gm%60;
    var tk=document.createElement('div');
    tk.className='tick'+(gn===0?' h':'');
    tk.style.top=(gm*PPM+HH)+'px';
    var g12=gh>12?gh-12:(gh===0?12:gh);
    tk.textContent=gn===0?(g12+(gh>=12?'pm':'am')):(g12+':30');
    gut.appendChild(tk);
}

var tabsEl=document.getElementById('tabs');
var pw=document.getElementById('pw');
var panels=[], tabs=[];
var nowLine = document.createElement('div'); nowLine.id='now-line';

DAYS.forEach(function(day, idx){
  var tb=document.createElement('button');
  tb.className='tab';
  tb.innerHTML='<div style="font-size:14px;font-weight:900">'+day.name+'</div>';
  tb.onclick=function(){show(idx);};
  tabsEl.appendChild(tb);
  tabs.push(tb);

  var pn=document.createElement('div');
  pn.className='panel';
  pn.innerHTML='<div class="dhdr'+(day.hv?' heavy':'')+'"><div><div class="dn">'+day.full+'</div><div class="ds">'+day.sub+'</div></div><span class="badge">'+day.p+' papers</span></div>';
  
  var bd=document.createElement('div');
  bd.className='body'; bd.style.height=TH+'px';

  // Grid Lines
  for(var lm=0; lm<=1440; lm+=30){
    var gl=document.createElement('div');
    gl.className='gl '+(lm%60===0?'h':'m');
    gl.style.top=(lm*PPM)+'px';
    bd.appendChild(gl);
  }

  BL.filter(function(b){return b.d===idx;}).forEach(function(b){
    var el=document.createElement('div');
    el.className='blk '+b.t;
    el.style.top=tp(b.sh,b.sm)+'px';
    el.style.height=(hp(b.sh,b.sm,b.eh,b.em)-2)+'px';
    
    var key='p-'+idx+'-'+b.sh+'-'+b.sm;
    if(localStorage.getItem(key)) el.classList.add('done');

    el.onclick=function(){
      if(b.t==='pp'){
        el.classList.toggle('done');
        localStorage.getItem(key)?localStorage.removeItem(key):localStorage.setItem(key,'1');
        updatePapers();
      }
    };

    el.innerHTML='<span class="bn">'+b.n+'</span><div class="btr"><span class="bt">'+ft(b.sh,b.sm)+'</span><span class="barr">&#8594;</span><span class="bt">'+ft(b.eh,b.em)+'</span></div><span class="bs">'+(b.s||'')+'</span>';
    bd.appendChild(el);
  });

  pn.appendChild(bd);
  pw.appendChild(pn);
  panels.push(pn);
});

function show(idx){
  tabs.forEach(function(t,i){t.className=i===idx?'tab on':'tab';});
  panels.forEach(function(p,i){p.className=i===idx?'panel on':'panel';});
  document.querySelector('.panel.on .body').appendChild(nowLine);
}

function updatePapers(){
  var c=0; for(var i=0;i<localStorage.length;i++) if(localStorage.key(i).startsWith('p-')) c++;
  document.getElementById('papers-count').innerText=c;
}

function refreshTime(){
  var n=new Date();
  var m=n.getHours()*60 + n.getMinutes();
  var d=[6,0,1,2,3,4,5][n.getDay()];
  if(window.curDay !== d) { show(d); window.curDay = d; }
  nowLine.style.top=(m*PPM)+'px';
}

// Initial Run
refreshTime(); updatePapers();
setInterval(refreshTime, 30000);
setTimeout(function(){
  var n=new Date();
  document.getElementById('scroller').scrollTop = (n.getHours()*60+n.getMinutes())*PPM - 100;
}, 500);
</script>
</body>
</html>
