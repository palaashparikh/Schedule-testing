<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palaash Pro Schedule</title>
<style>
:root { --accent: #ff7a2f; --bg: #08090d; --card: #0f1018; --border: #1e2035; --text: #e0e0f0; --muted: #52547a; }
body{margin:0;padding:16px 14px 60px;background:var(--bg);color:var(--text);font-family:Arial,sans-serif;overscroll-behavior:none}
h1{font-size:32px;font-weight:900;letter-spacing:3px;color:var(--accent);margin:0 0 4px}
.date-header{font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:14px;text-transform:uppercase}
.stats{display:flex;gap:8px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;flex:1}
.sv{font-size:24px;font-weight:900;color:var(--accent);line-height:1}
.sl{font-size:9px;color:var(--muted);text-transform:uppercase;margin-top:2px}

.tabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 16px;border-radius:8px;font-size:12px;font-weight:700;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer}
.tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}

.wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;max-height:75vh;overflow-y:scroll;position:relative;scroll-behavior:smooth}
.inner{display:flex;position:relative}
.gutter{width:50px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);position:relative}
.tick{position:absolute;right:8px;font-size:9px;color:var(--muted);font-weight:700;transform:translateY(-50%)}
.tick.h{color:#6062a0;font-size:10px}

.panel{display:none;flex:1;position:relative}
.panel.on{display:flex}
.body{position:relative;width:100%}
.gl{position:absolute;left:0;right:0;border-top:1px solid #1a1c30}
.gl.m{border-top:1px dashed #121420}

/* Blocks */
.blk{position:absolute;left:8px;right:8px;border-radius:6px;border-left:4px solid;padding:4px 8px;display:flex;flex-direction:column;justify-content:center;z-index:2;text-decoration:none}
.bn{font-size:12px;font-weight:700;display:block}
.bs{font-size:10px;opacity:0.7}

/* Checkbox Style */
.cb-container { position:absolute; right:8px; top:50%; transform:translateY(-50%); display:none; }
.pp .cb-container { display:block; }
.done { background: rgba(34,201,122,0.2) !important; border-color: #22c97a !important; color: #8aefca !important; }

/* Colors */
.pp{background:rgba(255,122,47,0.15);color:#ffc090;border-color:var(--accent)}
.ph{background:rgba(61,158,255,0.15);color:#7dc4ff;border-color:#3d9eff}
.ma{background:rgba(34,201,122,0.15);color:#5edfaa;border-color:#22c97a}
.ip{background:rgba(245,158,11,0.15);color:#ffc84a;border-color:#f59e0b}
.gym{background:rgba(255,85,85,0.15);color:#ff8888;border-color:#ff5555}
.other{background:#141828;color:var(--muted);border-color:var(--muted)}

/* Now Line */
#now-line{position:absolute;left:0;right:0;border-top:2px solid #ff4444;z-index:100;pointer-events:none}
#now-line::after{content:"NOW";position:absolute;right:2px;top:-12px;background:#ff4444;color:#fff;font-size:8px;padding:1px 4px;border-radius:4px}
</style>
</head>
<body>

<h1 id="greeting">SABER SCHEDULE</h1>
<div class="date-header" id="current-date"></div>

<div class="stats">
    <div class="stat"><div class="sv" id="done-count">0</div><div class="sl">Completed</div></div>
    <div class="stat"><div class="sv">20</div><div class="sl">Target</div></div>
</div>

<div class="tabs" id="tabs"></div>
<div class="wrap" id="main-scroll">
    <div class="inner">
        <div class="gutter" id="gutter"></div>
        <div id="pw" style="flex:1"></div>
    </div>
</div>

<script>
const PPM = 2.5; // Pixels per minute
const START_MIN = 0; // 12 AM
const END_MIN = 1440; // 11:59 PM
const HEIGHT = (END_MIN - START_MIN) * PPM;

const DAYS = [
    {name:'MON', p:4}, {name:'TUE', p:3}, {name:'WED', p:3}, 
    {name:'THU', p:1}, {name:'FRI', p:3}, {name:'SAT', p:3}, {name:'SUN', p:3}
];

const DATA = [
    // Mon
    {d:0, t:'pp', n:'Paper 1', s:'9702/11', sh:9, sm:15, eh:10, em:30},
    {d:0, t:'pp', n:'Paper 2', s:'9709/51', sh:11, sm:30, eh:12, em:45},
    {d:0, t:'pp', n:'Paper 3', s:'9702/21', sh:13, sm:40, eh:14, em:55},
    {d:0, t:'gym', n:'Gym: Chest', sh:16, sm:30, eh:18, em:0},
    {d:0, t:'pp', n:'Paper 4', s:'9709/52', sh:18, sm:35, eh:19, em:50},
    // Tue
    {d:1, t:'pp', n:'Paper 1', s:'9709/11', sh:8, sm:45, eh:10, em:35},
    {d:1, t:'ma', n:'Maths Class', s:'Andheri', sh:16, sm:30, eh:18, em:0, url:'https://maps.app.goo.gl/Rk54YKa3mMFQ9U2k7?g_st=ic'},
    {d:1, t:'ip', n:'IPMAT Class', s:'Vile Parle', sh:18, sm:30, eh:20, em:30, url:'https://maps.app.goo.gl/R1gaydWKPJfD8rRi7?g_st=ic'},
    // Thu
    {d:3, t:'ph', n:'Physics Class', s:'Bandra', sh:13, sm:30, eh:15, em:30, url:'https://maps.app.goo.gl/utZJ6Gy1xQahx1gL8?g_st=ic'}
];

// Gutter setup (24h)
const gut = document.getElementById('gutter');
gut.style.height = HEIGHT + 'px';
for(let i=0; i<=24; i++){
    let tick = document.createElement('div');
    tick.className = 'tick h';
    tick.style.top = (i * 60 * PPM) + 'px';
    tick.innerText = (i === 0 || i === 24) ? '12am' : (i > 12 ? i-12 + 'pm' : i + 'am');
    gut.appendChild(tick);
}

const tabsEl = document.getElementById('tabs');
const pw = document.getElementById('pw');
const nowLine = document.createElement('div');
nowLine.id = 'now-line';

DAYS.forEach((day, idx) => {
    let btn = document.createElement('button');
    btn.className = 'tab';
    btn.innerText = day.name;
    btn.onclick = () => show(idx);
    tabsEl.appendChild(btn);

    let panel = document.createElement('div');
    panel.className = 'panel';
    let body = document.createElement('div');
    body.className = 'body';
    body.style.height = HEIGHT + 'px';
    
    // Grid lines
    for(let i=0; i<24; i++) {
        let line = document.createElement('div');
        line.className = 'gl';
        line.style.top = (i * 60 * PPM) + 'px';
        body.appendChild(line);
    }

    DATA.filter(b => b.d === idx).forEach(b => {
        let block = document.createElement(b.url ? 'a' : 'div');
        if(b.url) block.href = b.url;
        block.className = `blk ${b.t}`;
        block.style.top = (b.sh * 60 + b.sm) * PPM + 'px';
        block.style.height = ((b.eh * 60 + b.em) - (b.sh * 60 + b.sm)) * PPM + 'px';
        
        let id = `task-${idx}-${b.sh}-${b.sm}`;
        if(localStorage.getItem(id)) block.classList.add('done');

        block.onclick = (e) => {
            if(b.t === 'pp') {
                e.preventDefault();
                block.classList.toggle('done');
                localStorage.getItem(id) ? localStorage.removeItem(id) : localStorage.setItem(id, 'true');
                updateCount();
            }
        };

        block.innerHTML = `<span class="bn">${b.n}</span><span class="bs">${b.s}</span>
            <div class="cb-container">${localStorage.getItem(id) ? '✅' : '⬜'}</div>`;
        body.appendChild(block);
    });

    panel.appendChild(body);
    pw.appendChild(panel);
});

function show(idx) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('on', i === idx));
    document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('on', i === idx));
    document.querySelector('.panel.on .body').appendChild(nowLine);
}

function updateCount() {
    let count = 0;
    for(let i=0; i<localStorage.length; i++) if(localStorage.key(i).startsWith('task-')) count++;
    document.getElementById('done-count').innerText = count;
}

function tick() {
    const now = new Date();
    const mins = now.getHours() * 60 + now.getMinutes();
    nowLine.style.top = (mins * PPM) + 'px';
}

// Init
const today = new Date();
const dayIdx = [6,0,1,2,3,4,5][today.getDay()];
document.getElementById('current-date').innerText = today.toDateString();
show(dayIdx);
tick();
updateCount();
setInterval(tick, 60000);

// Auto-scroll to current time
setTimeout(() => {
    const mins = today.getHours() * 60 + today.getMinutes();
    document.getElementById('main-scroll').scrollTop = (mins * PPM) - 100;
}, 500);

</script>
</body>
</html>
