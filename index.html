<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palaash Weekly Schedule</title>
<style>
body{margin:0;padding:16px 14px 60px;background:#08090d;color:#e0e0f0;font-family:Arial,sans-serif}
h1{font-size:32px;font-weight:900;letter-spacing:3px;color:#ff7a2f;margin:0 0 4px}
.sub{font-size:10px;color:#52547a;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.stat{background:#0f1018;border:1px solid #1e2035;border-radius:8px;padding:8px 12px;flex:1;min-width:70px}
.sv{font-size:24px;font-weight:900;color:#ff7a2f;line-height:1}
.sl{font-size:9px;color:#52547a;text-transform:uppercase;margin-top:2px}

.tabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;
  border:1px solid #1e2035;background:#0f1018;color:#52547a;cursor:pointer;min-width:62px;text-align:center}
.tab.on{background:#ff7a2f;color:#fff;border-color:#ff7a2f}

.wrap{background:#0f1018;border:1px solid #1e2035;border-radius:10px;overflow:hidden;
  max-height:70vh;overflow-y:scroll;position:relative;scroll-behavior:smooth}
.inner{display:flex}
.gutter{width:46px;flex-shrink:0;position:relative;background:#0f1018;border-right:1px solid #1e2035}
.tick{position:absolute;right:6px;font-size:9px;color:#3a3c60;font-weight:700;
  transform:translateY(-50%);white-space:nowrap}
.tick.h{color:#6062a0;font-size:10px}

.panel{display:none;flex:1;flex-direction:column;min-width:0}
.panel.on{display:flex}
.body{position:relative}
.gl{position:absolute;left:0;right:0}
.gl.h{border-top:1px solid #1a1c30}
.gl.m{border-top:1px dashed #121420}

/* Blocks - Original Styling Restored */
.blk{position:absolute;left:8px;right:8px;border-radius:6px;border-left:4px solid;
  overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:3px 8px;z-index:2;text-decoration:none}
.bn{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.bt{font-size:11px;font-weight:800;padding:1px 6px;border-radius:3px;white-space:nowrap;background:rgba(255,255,255,0.05);margin-top:2px;align-self:flex-start}
.bs{font-size:10px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.6;line-height:1.2}

/* Tracker Styles */
.done { background: rgba(34,201,122,0.2) !important; border-color: #22c97a !important; color: #8aefca !important; }
.done .bn::after { content: " ✓"; color: #22c97a; font-weight: bold; }

/* Colors - Original Restored */
.pp{background:rgba(255,122,47,.16);color:#ffc090;border-color:#ff7a2f}
.ph{background:rgba(61,158,255,.13);color:#7dc4ff;border-color:#3d9eff}
.ma{background:rgba(34,201,122,.13);color:#5edfaa;border-color:#22c97a}
.ip{background:rgba(245,158,11,.13);color:#ffc84a;border-color:#f59e0b}
.ch{background:rgba(168,85,247,.13);color:#c890ff;border-color:#a855f7}
.gym{background:rgba(255,85,85,.13);color:#ff8888;border-color:#ff5555}
.wake{background:#141828;color:#9090d0;border-color:#3040a0}
.meal{background:#1c1408;color:#d0a050;border-color:#705020}
.brk{background:#0c180c;color:#60a060;border-color:#1e4020}
.travel{background:#0c1620;color:#6090b8;border-color:#1e4060}

#now-line { position: absolute; left: 0; right: 0; border-top: 2px solid #ff4444; z-index: 100; pointer-events: none; }
#now-line::after { content: "NOW"; position: absolute; right: 4px; top: -14px; background: #ff4444; color: white; font-size: 8px; padding: 1px 4px; border-radius: 4px; }
</style>
</head>
<body>

<h1>WEEKLY SCHEDULE</h1>
<p id="date-display" class="sub">--</p>

<div class="stats">
  <div class="stat"><div class="sv" id="done-count">0</div><div class="sl">Papers Done</div></div>
  <div class="stat"><div class="sv">20</div><div class="sl">Weekly Goal</div></div>
</div>

<div class="tabs" id="tabs"></div>
<div class="wrap" id="scroller"><div class="inner">
  <div class="gutter" id="gutter"></div>
  <div id="pw" style="flex:1;position:relative"></div>
</div></div>

<script>
const PPM = 2.5; 
const HEIGHT = 1440 * PPM; // Full 24h
let currentDayIdx = -1;

const DAYS=[
  {name:'MON',full:'Monday',p:4}, {name:'TUE',full:'Tuesday',p:3},
  {name:'WED',full:'Wednesday',p:3}, {name:'THU',full:'Thursday',p:1},
  {name:'FRI',full:'Friday',p:3}, {name:'SAT',full:'Saturday',p:3},
  {name:'SUN',full:'Sunday',p:3}
];

const BL=[
  // MON
  {d:0, t:'pp', n:'Paper 1', s:'9702/11 - Physics P1', sh:9, sm:15, eh:10, em:30},
  {d:0, t:'pp', n:'Paper 2', s:'9709/51 - Maths P5', sh:11, sm:30, eh:12, em:45},
  {d:0, t:'pp', n:'Paper 3', s:'9702/21 - Physics P2', sh:13, sm:40, eh:14, em:55},
  {d:0, t:'gym', n:'Gym', s:'Chest - Shoulders', sh:16, sm:30, eh:18, em:0},
  {d:0, t:'pp', n:'Paper 4', s:'9709/52 - Maths P5', sh:18, sm:35, eh:19, em:50},
  // TUE
  {d:1, t:'pp', n:'Paper 1', s:'9709/11 - Maths P1', sh:8, sm:45, eh:10, em:35},
  {d:1, t:'ma', n:'Maths Class', s:'Andheri', sh:16, sm:30, eh:18, em:0, url:'https://maps.app.goo.gl/Rk54YKa3mMFQ9U2k7?g_st=ic'},
  {d:1, t:'ip', n:'IPMAT Class', s:'Vileparle', sh:18, sm:30, eh:20, em:30, url:'https://maps.app.goo.gl/R1gaydWKPJfD8rRi7?g_st=ic'},
  // THU
  {d:3, t:'ph', n:'Physics Class', s:'Bandra', sh:13, sm:30, eh:15, em:30, url:'https://maps.app.goo.gl/utZJ6Gy1xQahx1gL8?g_st=ic'},
  {d:3, t:'ma', n:'Maths Class', s:'Andheri', sh:16, sm:30, eh:18, em:0, url:'https://maps.app.goo.gl/Rk54YKa3mMFQ9U2k7?g_st=ic'},
  {d:3, t:'ip', n:'IPMAT Class', s:'Vileparle', sh:18, sm:30, eh:20, em:30, url:'https://maps.app.goo.gl/R1gaydWKPJfD8rRi7?g_st=ic'},
  // FRI
  {d:4, t:'ph', n:'Physics Class', s:'Bandra', sh:13, sm:30, eh:15, em:30, url:'https://maps.app.goo.gl/utZJ6Gy1xQahx1gL8?g_st=ic'}
];

// Gutter
const gut=document.getElementById('gutter');
gut.style.height=HEIGHT+'px';
for(let i=0; i<=24; i++){
    let tk=document.createElement('div'); tk.className='tick h';
    tk.style.top=(i*60*PPM)+'px';
    tk.textContent= i===0?'12am':(i>12?i-12+'pm':i+'am');
    gut.appendChild(tk);
}

const pw=document.getElementById('pw');
const tabsEl=document.getElementById('tabs');
const nl=document.createElement('div'); nl.id='now-line';

DAYS.forEach((day,idx)=>{
    let tab=document.createElement('button'); tab.className='tab';
    tab.innerHTML=`<b>${day.name}</b><br><small>${day.p}p</small>`;
    tab.onclick=()=>show(idx);
    tabsEl.appendChild(tab);

    let pn=document.createElement('div'); pn.className='panel';
    let body=document.createElement('div'); body.className='body';
    body.style.height=HEIGHT+'px';
    
    BL.filter(b=>b.d===idx).forEach(b=>{
        let el=document.createElement(b.url?'a':'div');
        if(b.url) el.href=b.url;
        el.className='blk '+b.t;
        el.style.top=(b.sh*60+b.sm)*PPM+'px';
        el.style.height=((b.eh*60+b.em)-(b.sh*60+b.sm))*PPM+'px';
        
        let key=`task-${idx}-${b.sh}-${b.sm}`;
        if(localStorage.getItem(key)) el.classList.add('done');

        el.onclick=(e)=>{
            if(b.t==='pp'){
                e.preventDefault();
                el.classList.toggle('done');
                localStorage.getItem(key)?localStorage.removeItem(key):localStorage.setItem(key,'1');
                updateStats();
            }
        };

        el.innerHTML=`<span class="bn">${b.n}</span><span class="bs">${b.s}</span><span class="bt">${b.sh}:${b.sm<10?'0'+b.sm:b.sm}</span>`;
        body.appendChild(el);
    });
    pn.appendChild(body);
    pw.appendChild(pn);
});

function show(idx){
    currentDayIdx = idx;
    document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===idx));
    document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('on',i===idx));
    document.querySelector('.panel.on .body').appendChild(nl);
}

function updateStats(){
    let count=0;
    for(let i=0;i<localStorage.length;i++) if(localStorage.key(i).startsWith('task-')) count++;
    document.getElementById('done-count').innerText=count;
}

function refreshTime(){
    const now=new Date();
    const mins=now.getHours()*60+now.getMinutes();
    const jsDay = [6,0,1,2,3,4,5][now.getDay()];
    
    // Auto day rollover
    if(currentDayIdx !== jsDay) {
        show(jsDay);
        document.getElementById('date-display').innerText = now.toDateString().toUpperCase();
    }
    
    nl.style.top=(mins*PPM)+'px';
}

// Init
refreshTime();
updateStats();
setInterval(refreshTime, 30000);

// Auto-scroll on load
setTimeout(()=>{
    const now=new Date();
    document.getElementById('scroller').scrollTop = (now.getHours()*60+now.getMinutes())*PPM - 100;
}, 300);
</script>
</body>
</html>
